# Qwen3-30B-A3B Full Fine-Tuning (FFT) Training Configuration
# KTransformers backend, finetuning_type=full -> kt_train_mode=full
#
# Note: output_dir is dynamically replaced by run_fft_test.sh with a timestamped path
# Note: This config is used as a base template; phase-specific parameters
#       (gradient_accumulation_steps, save_steps, max_steps, etc.)
#       are injected by run_fft_test.sh via temporary copies.

### model
model_name_or_path: /mnt/data3/models/Qwen3-30B-A3B
trust_remote_code: true
# Pure text MoE model -- no vision tower, no Conv3d, no multimodal projector

### method
stage: sft
do_train: true
finetuning_type: full
# full mode: lora_rank/lora_target are not applicable

### dataset
dataset: fft_stress_100
dataset_dir: /mnt/data2/wbw/FFTtest/Qwen3-30B-A3B/data
template: qwen3
cutoff_len: 2048          # All generated samples exceed 2048 tokens, so every step uses full cutoff
max_samples: 100          # 100 stress samples; all hit cutoff_len for accurate TPS measurement
overwrite_cache: true
preprocessing_num_workers: 8
dataloader_num_workers: 2

### output
# output_dir is dynamically replaced by run_fft_test.sh; this is a placeholder
output_dir: /mnt/data2/wbw/FFTtest/Qwen3-30B-A3B/test_log/PLACEHOLDER
logging_steps: 1
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: true
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 1.0e-5             # Full fine-tuning LR, one order smaller than LoRA
num_train_epochs: 3.0             # Multi-epoch to observe stability; max_steps will truncate early
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
# max_steps is dynamically injected per phase by run_fft_test.sh

# Timeout: full-mode backward is much slower, need large timeout
ddp_timeout: 360000000
resume_from_checkpoint: null

# Gradient clipping: monitor gradient norms
max_grad_norm: 1.0

### ktransformers
use_kt: true
# AMXBF16 backend reads native BF16 safetensors directly — no pre-conversion required
kt_weight_path: /mnt/data3/models/Qwen3-30B-A3B
