# Accelerate FSDP2 + KTransformers Configuration
# For Qwen3-30B-A3B Full Fine-Tuning (FFT) — 4 GPU, AMX INT8, 2 NUMA
#
# Backend: AMXINT8 (using pre-converted quantized weights)
# CPU layout: 2 NUMA nodes × 48 threads (kt_tp_enabled partitions MoE across NUMA)
# GPU count: 4 x RTX 4090 (24 GB each)
#
# Usage:
#   USE_KT=1 ACCELERATE_USE_KT=true accelerate launch \
#     --config_file configs/accelerate_fft_amxint8_4gpu.yaml \
#     -m llamafactory.cli train configs/train_fft_qwen3_30b.yaml

compute_environment: LOCAL_MACHINE
distributed_type: FSDP
fsdp_config:
  fsdp_auto_wrap_policy: TRANSFORMER_BASED_WRAP
  fsdp_cpu_ram_efficient_loading: true
  fsdp_offload_params: false
  fsdp_reshard_after_forward: true
  fsdp_state_dict_type: FULL_STATE_DICT
  fsdp_version: 2
mixed_precision: bf16
num_machines: 1
num_processes: 4
rdzv_backend: static
same_network: true
use_cpu: false

kt_config:
  enabled: true
  kt_backend: AMXINT8
  kt_num_threads: 96
  kt_tp_enabled: true
  kt_threadpool_count: 2
  kt_max_cache_depth: 2
  kt_share_backward_bb: true
